<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Depth Scanner — Setup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1c;--surface:#242428;--border:#3a3a42;--accent:#5b8fff;--ok:#3ddc84;--err:#ff5c5c;--text:#d8d8e0;--muted:#6e6e80;--mono:'SF Mono','Menlo','Consolas',monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;display:flex;align-items:center;justify-content:center;-webkit-app-region:drag}
.setup{width:480px;text-align:center;-webkit-app-region:no-drag}
h1{font-family:var(--mono);font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
h1 span{color:var(--accent);font-weight:700}
.sub{font-size:11px;color:var(--muted);margin-bottom:32px}
.status{font-size:13px;color:var(--text);margin-bottom:16px;min-height:20px}
.bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;height:24px;overflow:hidden;margin-bottom:16px;position:relative}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#4070e0);transition:width .3s;position:relative}
.bar-fill::after{content:"";position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(-45deg,transparent,transparent 5px,rgba(255,255,255,.06) 5px,rgba(255,255,255,.06) 10px);animation:stripe .8s linear infinite}
@keyframes stripe{0%{background-position:0 0}100%{background-position:20px 0}}
.bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--text);text-shadow:0 1px 2px rgba(0,0,0,.5);z-index:1}
.log{background:var(--surface);border:1px solid var(--border);border-radius:6px;height:120px;overflow-y:auto;padding:8px 12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-align:left;margin-bottom:16px}
.log::-webkit-scrollbar{width:4px}
.log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.error{color:var(--err);font-size:12px;margin-top:8px;white-space:pre-wrap;text-align:left;padding:12px;background:var(--surface);border:1px solid var(--err);border-radius:6px}
.done{color:var(--ok);font-size:16px;font-weight:600}
</style>
</head>
<body>
<div class="setup">
  <h1><span>DEPTH</span> SCANNER LAB</h1>
  <div class="sub">First-time setup — installing dependencies</div>
  <div class="status" id="status">Starting...</div>
  <div class="bar-wrap">
    <div class="bar-fill" id="bar" style="width:0%"></div>
    <div class="bar-text" id="bar-text"></div>
  </div>
  <div class="log" id="log"></div>
  <div id="error-box"></div>
</div>
<script>
const { ipcRenderer } = require('electron');

const statusEl = document.getElementById('status');
const barEl = document.getElementById('bar');
const barText = document.getElementById('bar-text');
const logEl = document.getElementById('log');
const errorBox = document.getElementById('error-box');

ipcRenderer.on('setup:status', (e, msg) => {
  statusEl.textContent = msg;
  const line = document.createElement('div');
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
});

ipcRenderer.on('setup:progress', (e, pct) => {
  barEl.style.width = pct + '%';
  barText.textContent = pct + '%';
});

ipcRenderer.on('setup:done', () => {
  statusEl.innerHTML = '<span class="done">Setup complete — launching...</span>';
  barEl.style.width = '100%';
  barText.textContent = '100%';
});

ipcRenderer.on('setup:error', (e, msg) => {
  statusEl.textContent = 'Setup failed';
  errorBox.innerHTML = '<div class="error">' + msg + '</div>';
});
</script>
</body>
</html>
